# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Rule-based ranker, fully deterministic, no ML training or embeddings.
  Ten scored signals combine into a weighted base_fit (title-tier match 35%,
  percentile-normalized core ML-infrastructure skills 25%, experience-band
  fit 15%, production/eval-language signal 10%, availability 10%, location
  fit 5%), multiplied by skill-credibility (self-report vs. Redrob's own
  skill_assessment_scores), a vision/speech-only penalty, a consolidated
  disqualifier multiplier (consulting-only career, title-chasing, platform
  inactivity, architect-not-coding), and a honeypot multiplier from three
  logical-impossibility checks. The skill-credibility cross-check is the
  main defense against keyword-stuffed skill lists: 56% of candidates with
  assessment data over-claim at least one skill relative to their own
  verified test score. Runtime ~15 seconds for 100K candidates on CPU,
  single-threaded, stdlib only.


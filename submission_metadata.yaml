# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"        # Used for architecture design, code review, and implementation
  - "Redrob AI"       # Used for code review and implementation.

ai_usage_summary: |
  Used Claude and AI assistants for architecture design, code review, and iterative refinement of the ranking pipeline, including feature engineering, disqualifier rules, and scoring formula design.

  All implementation decisions were reviewed and verified manually. The final system is deterministic, rule-based, and does not rely on external API calls or model inference during execution.

  The pipeline was tested using the official validation script and verified for reproducibility by running identical inputs multiple times and confirming identical outputs.

  No candidate data was sent to external AI services during execution of the ranking pipeline.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  The system is a fully deterministic, rule-based ranker with no ML training, embeddings, or external model inference.

  Candidates are scored using a weighted combination of ten engineered signals forming the base_fit score:

  - title-tier match (35%)
  - core ML-infrastructure skill coverage (25%)
  - experience-band alignment (15%)
  - production and evaluation signal from career history (10%)
  - availability and recency signals (10%)
  - location fit (5%)

  The base score is further adjusted using:
  - skill-credibility multiplier (alignment between self-reported skills and platform assessment scores)
  - vision/speech-only penalty for non-relevant profiles
  - disqualifier multipliers (consulting-only career, rapid title-chasing, platform inactivity, architect-only without coding evidence)
  - honeypot detection penalties based on logical consistency checks in candidate profiles

  The system prioritizes verifiable engineering evidence over keyword frequency or self-reported skills.

  Runtime is ~15 seconds for 100K candidates on CPU, using a single-threaded, standard-library-based implementation.

  The design ensures full reproducibility: identical input always produces identical output.
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
